<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JSON Tree Viewer</title>
  <script type="module" src="./smart.elements.js"></script>
  <link rel="stylesheet" href="./smart.default.css" />
  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .tree-panel {
      width: 40%;
      padding: 20px;
      border-right: 1px solid #ccc;
      box-sizing: border-box;
    }

    .output-panel {
      width: 60%;
      padding: 20px;
      box-sizing: border-box;
    }

    smart-tree {
      width: 100%;
      height: 100%;
    }

    .selected-output {
      background: #f9f9f9;
      border: 1px solid #ddd;
      padding: 10px;
      white-space: pre-wrap;
      height: 100%;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Tree View -->
    <div class="tree-panel">
      <h3>JSON Tree</h3>
      <smart-tree id="jsonTree" selection-mode="checkBox"></smart-tree>
    </div>

    <!-- Selected Node Display -->
    <div class="output-panel">
      <h3>Selected Nodes</h3>
      <div id="selectedDisplay" class="selected-output">No nodes selected.</div>
    </div>
  </div>

  <script>
    // Sample JSON
    const jsonData = {
      "name": "Root",
      "children": [
        {
          "name": "Child 1",
          "children": [
            { "name": "Grandchild 1" },
            { "name": "Grandchild 2" }
          ]
        },
        {
          "name": "Child 2"
        }
      ]
    };

    // Recursive conversion to Smart Tree format
    function convertToTreeItems(jsonNode) {
      const item = {
        label: jsonNode.name,
        expanded: true
      };
      if (jsonNode.children && jsonNode.children.length > 0) {
        item.items = jsonNode.children.map(convertToTreeItems);
      }
      return item;
    }

    const tree = document.getElementById('jsonTree');
    const selectedDisplay = document.getElementById('selectedDisplay');

    // Assign dataSource
    tree.dataSource = [convertToTreeItems(jsonData)];

    // Attach listener after short delay to allow tree to render
    setTimeout(() => {
      tree.addEventListener('change', () => {
        const checkedItems = tree.getCheckedItems();
        const labels = checkedItems.map(item => item.label);

        selectedDisplay.textContent = labels.length > 0
          ? labels.join('\n')
          : 'No nodes selected.';
      });
    }, 100);
  </script>

</body>
</html>
