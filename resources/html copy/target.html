<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column Transformations</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f4f4f4;
    }
    .btn {
      padding: 5px 10px;
      cursor: pointer;
    }
    .btn-add {
      background-color: #4CAF50;
      color: white;
      border: none;
    }
    .btn-remove {
      background-color: #f44336;
      color: white;
      border: none;
    }
  </style>
</head>
<body>
  <h2>Define Column Transformations</h2>
  
  <table id="transformTable">
    <thead>
      <tr>
        <th>Source Column</th>
        <th>Transformations</th>
        <th>Target Column</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>
          <input type="text" class="source-column" placeholder="Source Column">
        </td>
        <td>
          <div class="transformations">
            <select class="transformation-type">
              <option value="">Select Transformation</option>
              <option value="TRIM">TRIM</option>
              <option value="TO_DATE">TO_DATE</option>
              <option value="UPPERCASE">UPPERCASE</option>
              <option value="LOWERCASE">LOWERCASE</option>
              <option value="SUBSTRING">SUBSTRING</option>
            </select>
            <input type="text" class="parameters" placeholder="Parameters">
            <button class="btn btn-add" onclick="addTransformation(this)">Add</button>
          </div>
          <ul class="transform-list"></ul>
        </td>
        <td>
          <input type="text" class="target-column" placeholder="Target Column">
        </td>
        <td>
          <button class="btn btn-remove" onclick="removeRow(this)">Remove</button>
        </td>
      </tr>
    </tbody>
  </table>

  <button class="btn btn-add" onclick="addRow()">Add Row</button>

  <script>
    // Add a new row to the table
    function addRow() {
      const table = document.getElementById("transformTable").querySelector("tbody");
      const newRow = document.createElement("tr");
      newRow.innerHTML = `
        <td>
          <input type="text" class="source-column" placeholder="Source Column">
        </td>
        <td>
          <div class="transformations">
            <select class="transformation-type">
              <option value="">Select Transformation</option>
              <option value="TRIM">TRIM</option>
              <option value="TO_DATE">TO_DATE</option>
              <option value="UPPERCASE">UPPERCASE</option>
              <option value="LOWERCASE">LOWERCASE</option>
              <option value="SUBSTRING">SUBSTRING</option>
            </select>
            <input type="text" class="parameters" placeholder="Parameters">
            <button class="btn btn-add" onclick="addTransformation(this)">Add</button>
          </div>
          <ul class="transform-list"></ul>
        </td>
        <td>
          <input type="text" class="target-column" placeholder="Target Column">
        </td>
        <td>
          <button class="btn btn-remove" onclick="removeRow(this)">Remove</button>
        </td>
      `;
      table.appendChild(newRow);
    }

    // Remove a row from the table
    function removeRow(button) {
      const row = button.parentElement.parentElement;
      row.remove();
    }

    // Add a transformation to the list
    function addTransformation(button) {
      const parentDiv = button.parentElement;
      const transformType = parentDiv.querySelector(".transformation-type").value;
      const parameters = parentDiv.querySelector(".parameters").value;
      const transformList = parentDiv.nextElementSibling;

      if (!transformType) {
        alert("Please select a transformation type.");
        return;
      }

      const listItem = document.createElement("li");
      listItem.textContent = `${transformType} (${parameters || "No parameters"}) `;
      const removeButton = document.createElement("button");
      removeButton.textContent = "Remove";
      removeButton.className = "btn btn-remove";
      removeButton.onclick = function () {
        listItem.remove();
      };

      listItem.appendChild(removeButton);
      transformList.appendChild(listItem);

      // Reset the inputs
      parentDiv.querySelector(".transformation-type").value = "";
      parentDiv.querySelector(".parameters").value = "";
    }
  </script>
</body>
</html>
