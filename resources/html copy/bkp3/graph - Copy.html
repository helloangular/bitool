<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to bitool</title>

</body>
</html>



  <style>
    /* Define the styles for the layout */
    .container {
      display: flex;
      height: 100vh; /* Make the container take up the full viewport height */
    }
    
    .left-pane {
      flex: 15%; /* Make the left pane occupy 20% of the available space */
      padding: 20px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    
    .middle-pane {
      flex: 60%; /* Make the middle pane occupy 60% of the available space */
      padding: 20px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    
    .right-pane {
      flex: 25%; /* Make the right pane occupy 20% of the available space */
      padding: 20px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

.rectangle{
    width:80px;
    height:40px;
    background:blue;
}

  </style>

  </head>
  <body>
              



 <div class="container">
    <div class="left-pane">
      <!-- Content for the left pane -->
      <h1>Left Pane</h1>
    <ul id="dragContainer">
        <li class="draggable" draggable="true" id="item1">Item 1</li>
        <li class="draggable" draggable="true" id="item2">Item 2</li>
        <li class="draggable" draggable="true" id="item3">Item 3</li>
    </ul>    </div>
    <div class="middle-pane" >
      <!-- Content for the middle pane -->
    <div id="t2"   ondrop="drop(event)" ondragover="allowDrop(event)" class=rectangle style="position: relative;top: 20px;left: 20px;">T2</div>
    <div id="t3"  ondrop="drop(event)" ondragover="allowDrop(event)" class=rectangle style="position: relative;top: 40px;left: 60px;">T3</div>
  	
    </div>
    <div class="right-pane">
      <!-- Content for the right pane -->
      <h1>Right Pane</h1>
      <p>This is the content of the right pane.</p>
    </div>
  </div>



    
<script type="text/javascript">
     
var dragged;

  /* events fired on the draggable target */
  document.addEventListener("drag", function( event ) {

  }, false);

  document.addEventListener("dragstart", function( event ) {
      // store a ref. on the dragged elem
      dragged = event.target;
	event.dataTransfer.setData("Text", dragged.id);
      // make it half transparent
      event.target.style.opacity = .5;
  }, false);

  document.addEventListener("dragend", function( event ) {
      // reset the transparency
      event.target.style.opacity = "";
  }, false);

  /* events fired on the drop targets */
  document.addEventListener("dragover", function( event ) {
      // prevent default to allow drop
      event.preventDefault();
  }, false);

  document.addEventListener("dragenter", function( event ) {
      // highlight potential drop target when the draggable element enters it
      if ( event.target.className == "dropzone" ) {
          event.target.style.background = "purple";
      }

  }, false);

  document.addEventListener("dragleave", function( event ) {
      // reset background of potential drop target when the draggable element leaves it
      if ( event.target.className == "dropzone" ) {
          event.target.style.background = "";
      }

  }, false);

  document.addEventListener("drop", function( event ) {
      var id = event.dataTransfer.getData("Text");

      // prevent default action (open as link for some elements)
      event.preventDefault();
      // move dragged elem to the selected drop target
      if ( event.target.className == "rectangle" ) {
		alert(id + ' : ' + event.target.id);
      }
    
  }, false);



 </script>
    
    
  </body>
</html>
