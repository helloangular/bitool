<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree Hierarchy Example</title>
  <script type="module" src="https://www.htmlelements.com/demos/source/smart.tree.js"></script>
  <link rel="stylesheet" href="https://www.htmlelements.com/demos/styles/smart.default.css">
</head>
<body>
  <smart-tree id="tree">
    <smart-tree-items-group label="Fruits">
      <smart-tree-item label="Apple"></smart-tree-item>
      <smart-tree-item label="Banana"></smart-tree-item>
    </smart-tree-items-group>
    <smart-tree-items-group label="Vegetables">
      <smart-tree-items-group label="Leafy Greens">
        <smart-tree-item label="Spinach"></smart-tree-item>
        <smart-tree-item label="Lettuce"></smart-tree-item>
      </smart-tree-items-group>
      <smart-tree-item label="Carrot"></smart-tree-item>
    </smart-tree-items-group>
  </smart-tree>

  <script>
    const tree = document.getElementById('tree');

    // Listen for selection changes
    tree.addEventListener('change', (event) => {
      const selectedItem = event.detail.item;

      if (!selectedItem) {
        console.log('No item selected');
        return;
      }

      // Function to collect hierarchy
      const getHierarchy = (item) => {
        const hierarchy = [];
        while (item) {
          hierarchy.unshift(item.label); // Add current item to the start
          item = item.parentElement.closest('smart-tree-items-group');
        }
        return hierarchy;
      };

      // Get hierarchy of the selected item
      const hierarchy = getHierarchy(selectedItem);

      console.log('Hierarchy:', hierarchy.join(' > '));
    });
  </script>
</body>
</html>
