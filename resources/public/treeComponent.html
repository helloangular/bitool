<link rel="stylesheet" href="./app.css" />
<link rel="stylesheet" href="./source/styles/smart.default.css" />

<style>
  .container {
    display: flex;
    flex-direction: row;
    height: 100%;
    column-gap: 0px;
    width: 100%;
    font-family: 'DM Sans', -apple-system, sans-serif;
  }

  /* Smart-tree custom properties override */
  smart-tree {
    --smart-font-family: 'DM Sans', -apple-system, sans-serif;
    --smart-font-size: 12.5px;
    --smart-tree-item-height: 30px;
    --smart-primary: #3b7ddd;
    --smart-secondary: #f5f6f8;
    --smart-surface: #ffffff;
    --smart-border: #e2e4ea;
    --smart-ui-state-hover: #f0f1f4;
    --smart-ui-state-active: rgba(59,125,221,0.1);
    --smart-ui-state-focus: rgba(59,125,221,0.08);
    --smart-tree-indent: 16px;
    border-right: none !important;
  }

  .tree {
    width: 18%;
    height: 100%;
    min-width: 80px;
    max-width: 50%;
    background: #ffffff;
    overflow: auto;
    border-right: 1px solid #e2e4ea;
    --smart-tree-default-height: 100%;
    --smart-font-size: 12.5px;
    scrollbar-width: thin;
  }

  .tree::-webkit-scrollbar { width: 4px; }
  .tree::-webkit-scrollbar-thumb { background: #e2e4ea; border-radius: 2px; }

  #dropable-area {
    position: relative;
    flex-grow: 1;
    background-color: #f5f6f8;
    border: none;
    overflow: auto;
    scrollbar-width: none;
  }

  #dropable-area::before {
    content: 'Drop tables or connectors here';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #8b91a3;
    font-family: 'DM Sans', -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 500;
  }

  .resizer {
    width: 4px;
    height: 100%;
    background: transparent;
    cursor: col-resize;
    margin-left: -4px;
    z-index: 1;
    transition: background 0.15s;
  }

  .resizer:hover {
    background: #3b7ddd;
    opacity: 0.4;
  }

  /* Ensure rectangle-component custom elements have layout for offsetWidth/Height */
  rectangle-component {
    display: block;
  }

  #viewport {
    position: absolute;
    width: 100%;
    height: 100%;
    user-select: none;
  }

  #dropable-area.has-items::before {
    display: none;
  }

  .column-list-open {
    margin-right: 30%;
  }

  .smart-drop-down .smart-drop-down-container .smart-visibility-hidden {
    width: 100% !important;
  }

  svg.connector-layer {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }


  .popup {
    position: absolute;
    display: none;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
    min-width: 180px;
    border-radius: 10px;
    background: #ffffff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 1px #eceef2;
    border: 1px solid #e2e4ea;
    z-index: 1000;
    font-family: 'DM Sans', -apple-system, sans-serif;
  }

  .popup.show {
    display: flex;
  }

  .popup button {
    font-family: 'DM Sans', -apple-system, sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 7px 12px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: #1a1d26;
    cursor: pointer;
    text-align: left;
    transition: 0.15s;
  }

  .popup button:hover {
    background: #f0f1f4;
    color: #3b7ddd;
  }
</style>

<div class="container">
  <!-- TREE -->
  <smart-tree class="tree">
  </smart-tree>
  <div class="resizer"></div>
  <div id="dropable-area">
    <div id="viewport"></div>
  </div>
</div>
<!-- DIALOG -->
<smart-window class="dialog" label="Create Database Connection">
  <form id="profileForm">
    <div class="smart-form-row">
      <label> Connection Name: </label>
      <input class="underlined" name="connection_name"></input>
    </div>
    <div class="smart-form-row">
      <label> Connection Type: </label>
      <smart-drop-down-list name=dbtype>
        <smart-list-item selected value="postgresql">Oracle (JDBC)</smart-list-item>
        <smart-list-item value="value2">Item2</smart-list-item>
        <smart-list-item value="value3">Item3</smart-list-item>
      </smart-drop-down-list>
    </div>
    <div class="smart-form-row">
      <label> Usename: </label>
      <input class="underlined" name="username"></input>
    </div>
    <div class="smart-form-row">
      <label> Password: </label>
      <input class="underlined" name="password"></input>
    </div>

    <div class="smart-form-row" style="margin: 15px auto;">
      <label>Oracle (JDBC) settings:</label>
    </div>
    <div class="smart-form-row">
      <input type="checkbox" class="underlined" name="enterUrl"></input>
      <label> Enter Custom JDBC URL</label>
    </div>
    <div class="smart-form-row">
      <label>Driver: </label>
      <smart-drop-down-list>
        <smart-list-item selected value="value1">thin</smart-list-item>
        <smart-list-item value="value2">OCI</smart-list-item>
        <smart-list-item value="value3">Native API</smart-list-item>
      </smart-drop-down-list>
    </div>
    <div class="smart-form-row">
      <label> host: </label>
      <input class="underlined" name="host"></input>
    </div>
    <div class="smart-form-row">
      <label> port: </label>
      <input class="underlined" name="port"></input>
    </div>
    <div class="smart-form-row">
      <label> dbname: </label>
      <input class="underlined" name="dbname"></input>
    </div>
    <div class="smart-form-row">
      <label> SID: </label>
      <input class="underlined" name="sid"></input>
    </div>
    <div class="smart-form-row">
      <label> Service Name: </label>
      <input class="underlined" name="serviceName"></input>
    </div>
    <div class="smart-form-row submit">
      <smart-button class="success" form-control-name="submit" type="submit">Ok</smart-button>
    </div>
  </form>
</smart-window>

<!-- popup -->
<div id="optionsPopup" class="popup">
  <button data-action="join">Join</button>
  <button data-action="union">Union</button>
  <button data-action="replace">Replace</button>
  <button data-action="cancel">Cancel</button>
</div>
