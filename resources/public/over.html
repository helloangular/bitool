<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textarea with Dropdown Overlay</title>
<style>
  /* Style for the dropdown overlay */
  .dropdown-overlay {
    position: absolute;
    background-color: white;
    border: 1px solid #ccc;
    max-height: 150px;
    overflow-y: auto;
    z-index: 1000;
  }
  
  /* Style for each option in the dropdown */
  .dropdown-option {
    padding: 5px 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<textarea id="myTextarea" style="position: relative; width: 300px; height: 100px;"></textarea>

<div id="dropdownOverlay" class="dropdown-overlay" style="display: none;"></div>

<script>
  // Get the textarea and the dropdown overlay
  const textarea = document.getElementById('myTextarea');
  const dropdownOverlay = document.getElementById('dropdownOverlay');

  // List of options for the dropdown
  const options = [
    'Option 1',
    'Option 2',
    'Option 3',
    'Option 4',
    'Option 5'
  ];

  // Function to show the dropdown overlay
  function showDropdown() {
    dropdownOverlay.innerHTML = ''; // Clear previous options
    options.forEach(option => {
      const optionElement = document.createElement('div');
      optionElement.classList.add('dropdown-option');
      optionElement.textContent = option;
      optionElement.addEventListener('click', () => {
        textarea.value += option; // Append the selected option to the textarea
        hideDropdown();
      });
      dropdownOverlay.appendChild(optionElement);
    });
    dropdownOverlay.style.display = 'block';
  }

  // Function to hide the dropdown overlay
  function hideDropdown() {
    dropdownOverlay.style.display = 'none';
  }

  // Event listener to show dropdown when textarea is focused
  textarea.addEventListener('focus', showDropdown);

  // Event listener to hide dropdown when textarea loses focus
  textarea.addEventListener('blur', hideDropdown);
</script>

</body>
</html>
