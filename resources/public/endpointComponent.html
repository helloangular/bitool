<link rel="stylesheet" href="./source/styles/smart.default.css" />
<link rel="stylesheet" href="./styles/apiComponent.css" />
<div class="side-panel">
  <div class="panel-header">
    <button class="save" id="saveButton" disabled>Save</button>
    <button class="close" id="closeButton">Close</button>
  </div>
  <div class="panel-item">
    <h3 style="margin:0 0 10px 0;">HTTP Endpoint</h3>

    <div class="form-group">
      <label>HTTP Method</label>
      <select id="httpMethod" style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="DELETE">DELETE</option>
        <option value="PATCH">PATCH</option>
      </select>
    </div>

    <div class="form-group">
      <label>Route Path</label>
      <input type="text" id="routePath" placeholder="/users/:id/orders"
        style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;" />
      <small style="color:#888;">Use :paramName for path parameters (e.g. /users/:id)</small>
    </div>

    <div class="form-group">
      <label>Description</label>
      <input type="text" id="description" placeholder="Describe what this endpoint does"
        style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;" />
    </div>

    <div class="form-group">
      <label>Response Format</label>
      <select id="responseFormat" style="width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;">
        <option value="json">JSON</option>
        <option value="csv">CSV</option>
        <option value="edn">EDN</option>
      </select>
    </div>

    <!-- Path Parameters -->
    <div class="card" style="margin-top:12px;padding:10px;border:1px solid #e0e0e0;border-radius:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h4 style="margin:0;">Path Parameters</h4>
        <button id="parsePathBtn" style="padding:4px 8px;font-size:12px;cursor:pointer;">Parse from Route</button>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="border-bottom:1px solid #ddd;">
            <th style="text-align:left;padding:4px;">Name</th>
            <th style="text-align:left;padding:4px;">Type</th>
            <th style="text-align:left;padding:4px;">Description</th>
            <th style="width:30px;"></th>
          </tr>
        </thead>
        <tbody id="pathParamsBody"></tbody>
      </table>
    </div>

    <!-- Query Parameters -->
    <div class="card" style="margin-top:12px;padding:10px;border:1px solid #e0e0e0;border-radius:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h4 style="margin:0;">Query Parameters</h4>
        <button id="addQueryParamBtn" style="padding:4px 8px;font-size:12px;cursor:pointer;">+ Add</button>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="border-bottom:1px solid #ddd;">
            <th style="text-align:left;padding:4px;">Name</th>
            <th style="text-align:left;padding:4px;">Type</th>
            <th style="text-align:left;padding:4px;">Required</th>
            <th style="text-align:left;padding:4px;">Default</th>
            <th style="width:30px;"></th>
          </tr>
        </thead>
        <tbody id="queryParamsBody"></tbody>
      </table>
    </div>

    <!-- Request Body Schema (shown for POST/PUT/PATCH) -->
    <div id="bodySchemaSection" class="card" style="margin-top:12px;padding:10px;border:1px solid #e0e0e0;border-radius:6px;display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h4 style="margin:0;">Request Body Fields</h4>
        <button id="addBodyFieldBtn" style="padding:4px 8px;font-size:12px;cursor:pointer;">+ Add</button>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="border-bottom:1px solid #ddd;">
            <th style="text-align:left;padding:4px;">Field</th>
            <th style="text-align:left;padding:4px;">Type</th>
            <th style="text-align:left;padding:4px;">Required</th>
            <th style="text-align:left;padding:4px;">Description</th>
            <th style="width:30px;"></th>
          </tr>
        </thead>
        <tbody id="bodySchemaBody"></tbody>
      </table>
    </div>

    <!-- Test Section -->
    <div class="card" style="margin-top:12px;padding:10px;border:1px solid #e0e0e0;border-radius:6px;">
      <h4 style="margin:0 0 8px 0;">Test Endpoint</h4>
      <div id="testParamsContainer"></div>
      <button id="testBtn" style="padding:6px 12px;cursor:pointer;margin-top:8px;">Send Test Request</button>
      <pre id="testResult" style="max-height:200px;overflow:auto;background:#f5f5f5;padding:8px;border-radius:4px;font-size:12px;margin-top:8px;display:none;"></pre>
    </div>
  </div>
</div>
