<link rel="stylesheet" href="./app.css" />
<link rel="stylesheet" href="./source/styles/smart.default.css" />

<style>
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    height: 100%;
    width: 30%;
  }

  .dropable-area {
    position: relative;
    min-height: 600px;
    width: 100%;
    background-color: #f5f5f5;
    border: 2px dashed #ccc;
    overflow: auto;
  }

  .dropable-area::before {
    content: 'Drop tables or views here';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #666;
    pointer-events: none;
  }

  .dropable-area.has-items::before {
    display: none;
  }

  .column-list-open {
    margin-right: 30%;
  }

  .smart-drop-down .smart-drop-down-container .smart-visibility-hidden {
    width: 100% !important;
  }
</style>

<div class="container">
  <!-- DIALOG -->
  <smart-window class="dialog" label="Create Database Connection">
    <form id="profileForm">
      <div class="smart-form-row">
        <label> Connection Name: </label>
        <input class="underlined" name="connectionName"></input>
      </div>
      <div class="smart-form-row">
        <label> Connection Type: </label>
        <smart-drop-down-list>
          <smart-list-item selected value="value1">Oracle (JDBC)</smart-list-item>
          <smart-list-item value="value2">Item2</smart-list-item>
          <smart-list-item value="value3">Item3</smart-list-item>
        </smart-drop-down-list>
      </div>
      <div class="smart-form-row">
        <label> Usename: </label>
        <input class="underlined" name="username"></input>
      </div>
      <div class="smart-form-row">
        <label> Password: </label>
        <input class="underlined" name="password"></input>
      </div>

      <div class="smart-form-row" style="margin: 15px auto;">
        <label>Oracle (JDBC) settings:</label>
      </div>
      <div class="smart-form-row">
        <input type="checkbox" class="underlined" name="enterUrl"></input>
        <label> Enter Custom JDBC URL</label>
      </div>
      <div class="smart-form-row">
        <label>Driver: </label>
        <smart-drop-down-list>
          <smart-list-item selected value="value1">thin</smart-list-item>
          <smart-list-item value="value2">OCI</smart-list-item>
          <smart-list-item value="value3">Native API</smart-list-item>
        </smart-drop-down-list>
      </div>
      <div class="smart-form-row">
        <label> host: </label>
        <input class="underlined" name="host"></input>
      </div>
      <div class="smart-form-row">
        <label> SID: </label>
        <input class="underlined" name="sid"></input>
      </div>
      <div class="smart-form-row">
        <label> Service Name: </label>
        <input class="underlined" name="serviceName"></input>
      </div>
      <div class="smart-form-row submit">
        <smart-button class="success" form-control-name="submit" type="submit">Ok</smart-button>
      </div>
    </form>
  </smart-window>

  <!-- TREE -->
  <smart-tree style="height: 100%; width: 100%">
  </smart-tree>
</div>
<div class="dropable-area">

</div>
<form method=post id=addtable name=addtable action="/addtable">
  <input type=hidden name=table1 id=table1 value="">
  <input type=hidden name=table2 id=table2 value="">
</form>
