<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="stylesheet" href="./source/styles/smart.default.css" type="text/css" />
 <script type="text/javascript" src="./source/modules/smart.element.js"></script>
 <script type="text/javascript" src="./source/modules/smart.button.js"></script>
 <script type="text/javascript" src="./source/modules/smart.menu.js"></script>
 <script type="text/javascript" src="./source/modules/smart.scrollbar.js"></script>
 <script type="text/javascript" src="./source/modules/smart.tree.js"></script>
 <script>
 function showTree() {
     document.querySelector('smart-tree').dataSource = [{
                label: 'Cats',
                selected: true,
                items: [
                    {
                        label: 'Tiger',
                        selected: true
                    },
                    {
                        label: 'Lion'
                    },
                    {
                        label: 'Jaguar'
                    },
                    {
                        label: 'Leopard'
                    },
                    {
                        label: 'Serval'
                    },
                    {
                        label: 'Domestic cat'
                    }
                ]
            },
                {
                    label: 'Dogs',
                    expanded: true,
                    items: [
                        {
                            label: 'Gray wolf'
                        },
                        {
                            label: 'Ethiopian wolf',
                            selected: true
                        },
                        {
                            label: 'Arctic fox',
                            selected: true
                        },
                        {
                            label: 'Dingo'
                        },
                        {
                            label: 'Domestic dog',
                            selected: true
                        }
                    ]
                }
            ];
     }
 </script>
</head>
<body>
    <smart-tree></smart-tree>
    <input type=button onClick="showTree();" name=tree value=Tree />
</body>
</html>
