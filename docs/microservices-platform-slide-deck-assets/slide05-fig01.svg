<svg width="860" height="340" viewBox="0 0 860 340">
      <!-- Pipeline stages -->
      <!-- Stage 1: BRD -->
      <rect x="30" y="30" width="170" height="80" rx="14" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.4)" stroke-width="2"/>
      <text x="115" y="58" text-anchor="middle" fill="#93c5fd" font-family="Inter,sans-serif" font-size="15" font-weight="700">BRD</text>
      <text x="115" y="76" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Business Requirements</text>
      <text x="115" y="90" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Document</text>

      <!-- AI arrow 1 -->
      <line x1="204" y1="70" x2="250" y2="70" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arr)"/>
      <rect x="210" y="48" width="36" height="18" rx="9" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
      <text x="228" y="61" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="9" font-weight="700">AI</text>

      <!-- Stage 2: OpenAPI Spec -->
      <rect x="256" y="30" width="170" height="80" rx="14" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.4)" stroke-width="2"/>
      <text x="341" y="58" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="15" font-weight="700">OpenAPI Spec</text>
      <text x="341" y="76" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Paths, schemas,</text>
      <text x="341" y="90" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">security, responses</text>

      <!-- AI arrow 2 -->
      <line x1="430" y1="70" x2="476" y2="70" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arr)"/>
      <rect x="436" y="48" width="36" height="18" rx="9" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
      <text x="454" y="61" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="9" font-weight="700">AI</text>

      <!-- Stage 3: Model -->
      <rect x="482" y="30" width="170" height="80" rx="14" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)" stroke-width="2"/>
      <text x="567" y="58" text-anchor="middle" fill="#6ee7b7" font-family="Inter,sans-serif" font-size="15" font-weight="700">Model</text>
      <text x="567" y="76" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Visual integration</text>
      <text x="567" y="90" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">model on canvas</text>

      <!-- AI arrow 3 -->
      <line x1="656" y1="70" x2="702" y2="70" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arr)"/>
      <rect x="662" y="48" width="36" height="18" rx="9" fill="rgba(167,139,250,0.3)" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
      <text x="680" y="61" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="9" font-weight="700">AI</text>

      <!-- Stage 4: Production -->
      <rect x="708" y="30" width="130" height="80" rx="14" fill="rgba(244,114,182,0.1)" stroke="rgba(244,114,182,0.4)" stroke-width="2"/>
      <text x="773" y="58" text-anchor="middle" fill="#f9a8d4" font-family="Inter,sans-serif" font-size="15" font-weight="700">Production</text>
      <text x="773" y="76" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Live service</text>
      <text x="773" y="90" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">deployed &amp; monitored</text>

      <!-- HUMAN IN THE LOOP gates -->
      <!-- Gate 1 -->
      <line x1="115" y1="114" x2="115" y2="140" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
      <rect x="55" y="143" width="120" height="36" rx="8" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
      <text x="115" y="158" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="9" font-weight="700">HUMAN REVIEW</text>
      <text x="115" y="171" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="8">Approve BRD scope</text>

      <!-- Gate 2 -->
      <line x1="341" y1="114" x2="341" y2="140" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
      <rect x="281" y="143" width="120" height="36" rx="8" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
      <text x="341" y="158" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="9" font-weight="700">HUMAN REVIEW</text>
      <text x="341" y="171" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="8">Validate API contract</text>

      <!-- Gate 3 -->
      <line x1="567" y1="114" x2="567" y2="140" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
      <rect x="507" y="143" width="120" height="36" rx="8" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
      <text x="567" y="158" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="9" font-weight="700">HUMAN REVIEW</text>
      <text x="567" y="171" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="8">Test &amp; approve model</text>

      <!-- Gate 4 -->
      <line x1="773" y1="114" x2="773" y2="140" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
      <rect x="713" y="143" width="120" height="36" rx="8" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.4)" stroke-width="2"/>
      <text x="773" y="158" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="9" font-weight="700">HUMAN REVIEW</text>
      <text x="773" y="171" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="8">Canary &amp; sign-off</text>

      <!-- Key properties bar -->
      <rect x="30" y="205" width="808" height="50" rx="12" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.2)" stroke-width="1.5"/>

      <text x="145" y="226" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="12" font-weight="700">Deterministic</text>
      <text x="145" y="243" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Same input = same output</text>

      <line x1="270" y1="213" x2="270" y2="247" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>

      <text x="385" y="226" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="12" font-weight="700">Auditable</text>
      <text x="385" y="243" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Every AI step is versioned</text>

      <line x1="500" y1="213" x2="500" y2="247" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>

      <text x="610" y="226" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="12" font-weight="700">Human-Gated</text>
      <text x="610" y="243" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">No step runs without approval</text>

      <line x1="725" y1="213" x2="725" y2="247" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>

      <text x="795" y="226" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="12" font-weight="700">Reversible</text>
      <text x="795" y="243" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="10">Rollback any stage</text>

      <!-- Bottom detail cards -->
      <rect x="30" y="272" width="196" height="58" rx="10" fill="rgba(96,165,250,0.06)" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>
      <text x="128" y="292" text-anchor="middle" fill="#93c5fd" font-family="Inter,sans-serif" font-size="10" font-weight="600">BRD &rarr; OpenAPI</text>
      <text x="128" y="308" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">AI extracts endpoints, params,</text>
      <text x="128" y="320" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">schemas from requirements</text>

      <rect x="236" y="272" width="196" height="58" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
      <text x="334" y="292" text-anchor="middle" fill="#c4b5fd" font-family="Inter,sans-serif" font-size="10" font-weight="600">OpenAPI &rarr; Model</text>
      <text x="334" y="308" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">AI auto-generates the visual</text>
      <text x="334" y="320" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">model with correct blocks</text>

      <rect x="442" y="272" width="196" height="58" rx="10" fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
      <text x="540" y="292" text-anchor="middle" fill="#6ee7b7" font-family="Inter,sans-serif" font-size="10" font-weight="600">Model &rarr; Production</text>
      <text x="540" y="308" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">AI configures deployment,</text>
      <text x="540" y="320" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">scaling, monitoring rules</text>

      <rect x="648" y="272" width="190" height="58" rx="10" fill="rgba(244,114,182,0.06)" stroke="rgba(244,114,182,0.15)" stroke-width="1"/>
      <text x="743" y="292" text-anchor="middle" fill="#f9a8d4" font-family="Inter,sans-serif" font-size="10" font-weight="600">Continuous Improvement</text>
      <text x="743" y="308" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">AI suggests optimizations from</text>
      <text x="743" y="320" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="9">production metrics &amp; logs</text>
    </svg>